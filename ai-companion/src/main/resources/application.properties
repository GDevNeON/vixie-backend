spring.application.name=ai-companion
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8081
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/vixie_ai
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson (match user-auth API style)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms

# JWT (shared secret with user-auth — validation only)
security.jwt.secret=${JWT_SECRET:change-me-please-very-very-secret-jwt-key-change-me}

# AI Provider Keys
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
ai.elevenlabs.api-key=${ELEVENLABS_API_KEY:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{X-Correlation-Id:-}]

# Flyway
spring.flyway.locations=classpath:db/migration

# Cloudinary (asset CDN for marketplace thumbnails/previews)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Cross-service communication (ai-companion -> user-auth)
vixie.user-auth.base-url=${USER_AUTH_BASE_URL:http://localhost:8080}
vixie.internal.service-key=${INTERNAL_SERVICE_KEY:}
