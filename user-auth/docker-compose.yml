version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vixie-user-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vixie_user_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - vixie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vixie_user_auth"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  vixie-network:
    driver: bridge
